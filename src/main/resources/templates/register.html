<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diogenes - Create account</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="page inner-page auth-page">
    <section class="page-head">
        <span class="eyebrow">Create account</span>
        <h1>Start your space</h1>
        <p>Your password is stored as a secure hash — never as plain text.</p>
    </section>

    <article class="card auth-card">
        <form th:action="@{/register}" th:object="${registerForm}" method="post" class="form-stack">
            <label>
                Email
                <input type="email" th:field="*{email}" autocomplete="username">
                <small class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
            </label>
            <label>
                Display name
                <input type="text" th:field="*{displayName}" autocomplete="name">
                <small class="error" th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}"></small>
            </label>
            <label>
                Password
                <input type="password" th:field="*{password}" autocomplete="new-password">
                <small class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
            </label>
            <label>
                Confirm password
                <input type="password" th:field="*{confirmPassword}" autocomplete="new-password">
                <small class="error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></small>
            </label>
            <button class="button primary" type="submit">Create account</button>
        </form>

        <p class="auth-switch">
            Already have an account?
            <a th:href="@{/login}">Sign in</a>
        </p>
    </article>
</main>
</body>
</html>
